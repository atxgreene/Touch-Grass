name: Deploy PlayFinder to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/playfinder-app-concept-q6rbjg
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # NOTE: We deliberately do NOT use actions/configure-pages here. Its only
      # job is to compute the base path, and its Pages API call has been
      # intermittently returning 503s. The base path is fixed for this repo, so
      # we hardcode it and keep the build independent of that flaky call.
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /Touch-Grass/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
